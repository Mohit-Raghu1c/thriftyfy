<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Seller - Thriftify</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .profile-card {
      max-width: 600px;
      margin: auto;
      background: #f8f9fa;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .info-label {
      font-weight: 600;
      color: #555;
    }

    .info-value {
      background: white;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
    }

    footer {
      background-color: #212529;
      color: white;
      padding: 20px 0;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/index.html">Thriftify</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Buy</a></li>
        <li class="nav-item"><a class="nav-link" href="/upload.html">Sell</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CONTACT PAGE -->
<div class="container my-5">
  <div class="profile-card">
    <h3 class="mb-4">Seller Contact Information</h3>

    <div class="row g-3">

      <div class="col-md-6">
        <div class="info-label">Full Name</div>
        <div class="info-value">Lakshya</div>
      </div>

      <div class="col-md-6">
        <div class="info-label">Email</div>
        <div class="info-value">example@email.com</div>
      </div>

      <div class="col-md-6">
        <div class="info-label">Phone Number</div>
        <div class="info-value">9876543210</div>
      </div>

      <div class="col-md-6">
        <div class="info-label">City</div>
        <div class="info-value">Bhopal</div>
      </div>

      <div class="col-md-6">
        <div class="info-label">Address</div>
        <div class="info-value">Street / Area</div>
      </div>

      <div class="col-md-6">
        <div class="info-label">Pincode</div>
        <div class="info-value">462001</div>
      </div>

    </div>

    <div class="mt-4">
      <a href="tel:9876543210" class="btn btn-primary">Call Seller</a>
      <a href="https://wa.me/919876543210" class="btn btn-success">WhatsApp</a>
      <a href="mailto:example@email.com" class="btn btn-outline-primary">Email Seller</a>
    </div>

  </div>
</div>

<!-- Footer -->
<footer class="text-center">
  <div class="container">
    <p>&copy; 2026 Thriftify | Buy • Sell • Donate</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

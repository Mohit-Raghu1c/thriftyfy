<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thriftify - Auth & Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    .form-container {
      max-width: 500px;
      margin: auto;
      background: #f8f9fa;
      padding: 25px;
      border-radius: 10px;
    }

    .profile-card {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      background-color: #212529;
      color: white;
      padding: 20px 0;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Thriftify</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Buy</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Sell</a></li>
        <li class="nav-item"><a class="nav-link active" href="#">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- LOGIN PAGE -->
<div class="container my-5 min-vh-100">
  <div class="form-container">
    <h3 class="mb-3">Login</h3>
    <form>
      <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="Enter email">
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input type="password" class="form-control" placeholder="Enter password">
      </div>

      <button class="btn btn-primary w-100">Login</button>

      <p class="mt-3 text-center">Don't have an account? <a href="signup.html">Register</a></p>
    </form>
  </div>
</div>


<!-- Footer -->
<footer class="text-center">
  <div class="container">
    <p>&copy; 2026 Thriftify | Buy • Sell • Donate</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
